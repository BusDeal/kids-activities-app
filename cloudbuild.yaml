steps:
  # Build the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/kids-activities-backend:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/kids-activities-backend:latest',
      './server'
    ]

  # Push the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/kids-activities-backend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/kids-activities-backend:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kids-activities-prod-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/kids-activities-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'gcr.io/$PROJECT_ID/kids-activities-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/kids-activities-backend:latest'